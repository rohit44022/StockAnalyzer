{# Floating theme picker. Include once, just before </body>. #}
<style>
.sc-theme-fab{position:fixed;right:18px;bottom:18px;z-index:1080;border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:#1f2937;color:#f6d365;border:1px solid rgba(255,255,255,.18);cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.45);font-size:1.2rem;transition:transform .2s,box-shadow .2s}
.sc-theme-fab:hover{transform:scale(1.08);box-shadow:0 10px 26px rgba(0,0,0,.55)}
.sc-theme-panel{position:fixed;right:18px;bottom:74px;z-index:1080;width:280px;max-height:60vh;overflow:hidden;display:none;background:#0f172a;border:1px solid rgba(255,255,255,.12);border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.55);color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif}
.sc-theme-panel.open{display:flex;flex-direction:column}
.sc-theme-panel .stp-head{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08);font-size:.85rem;font-weight:600;letter-spacing:.3px;display:flex;align-items:center;justify-content:space-between}
.sc-theme-panel .stp-head small{color:#94a3b8;font-weight:400;font-size:.72rem}
.sc-theme-panel .stp-body{overflow-y:auto;padding:6px 0}
.sc-theme-panel .stp-section{padding:6px 14px 2px;font-size:.68rem;text-transform:uppercase;letter-spacing:.6px;color:#64748b}
.sc-theme-panel .stp-item{display:flex;align-items:center;gap:10px;padding:7px 14px;cursor:pointer;font-size:.85rem;transition:background .15s}
.sc-theme-panel .stp-item:hover{background:rgba(255,255,255,.06)}
.sc-theme-panel .stp-item.active{background:rgba(99,102,241,.18);color:#a5b4fc}
.sc-theme-panel .stp-dot{width:14px;height:14px;border-radius:50%;border:1px solid rgba(255,255,255,.25);flex-shrink:0}
.sc-theme-panel .stp-mode{margin-left:auto;font-size:.65rem;text-transform:uppercase;color:#64748b;letter-spacing:.5px}
.sc-theme-panel .stp-close{background:none;border:none;color:#64748b;cursor:pointer;font-size:1.1rem;padding:0;line-height:1}
.sc-theme-panel .stp-close:hover{color:#e2e8f0}
</style>

<button class="sc-theme-fab" id="scThemeFab" type="button" title="Change theme" aria-label="Change theme">
  <i class="bi bi-palette-fill"></i>
</button>
<div class="sc-theme-panel" id="scThemePanel" role="dialog" aria-label="Theme picker">
  <div class="stp-head">
    <span><i class="bi bi-palette2 me-1"></i> Bootswatch Theme</span>
    <button class="stp-close" id="scThemeClose" aria-label="Close">&times;</button>
  </div>
  <div class="stp-body" id="scThemeBody"></div>
</div>

<script>
(function () {
  const THEMES   = {{ bootswatch_themes | tojson | safe }};
  const ACTIVE   = {{ theme_slug | tojson | safe }};
  const BS_VER   = "5.3.3";
  const BSW_VER  = "5.3.3";

  const fab    = document.getElementById('scThemeFab');
  const panel  = document.getElementById('scThemePanel');
  const close  = document.getElementById('scThemeClose');
  const body   = document.getElementById('scThemeBody');

  // Theme dot color (hand-picked accent per theme to give a visual hint)
  const DOT = {
    default:'#0d6efd', cerulean:'#2fa4e7', cosmo:'#2780e3', flatly:'#18bc9c',
    journal:'#eb6864', litera:'#4582ec', lumen:'#158cba', lux:'#1a1a1a',
    materia:'#2196f3', minty:'#78c2ad', morph:'#378dfc', pulse:'#593196',
    sandstone:'#93c54b', simplex:'#d9230f', sketchy:'#333', spacelab:'#446e9b',
    united:'#e95420', yeti:'#008cba', zephyr:'#3459e6',
    cyborg:'#2a9fd6', darkly:'#375a7f', quartz:'#aa30bb', slate:'#3a3f44',
    solar:'#b58900', superhero:'#df691a', vapor:'#a52aff'
  };

  function bsCssUrl(slug) {
    return slug === 'default'
      ? `https://cdn.jsdelivr.net/npm/bootstrap@${BS_VER}/dist/css/bootstrap.min.css`
      : `https://cdn.jsdelivr.net/npm/bootswatch@${BSW_VER}/dist/${slug}/bootstrap.min.css`;
  }

  function render() {
    const groups = {dark: [], light: []};
    THEMES.forEach(t => groups[t.mode].push(t));
    const sec = (label, list) => `
      <div class="stp-section">${label}</div>
      ${list.map(t => `
        <div class="stp-item ${t.slug === ACTIVE ? 'active' : ''}" data-slug="${t.slug}" data-mode="${t.mode}">
          <span class="stp-dot" style="background:${DOT[t.slug] || '#888'}"></span>
          <span>${t.label}</span>
          <span class="stp-mode">${t.mode}</span>
        </div>
      `).join('')}`;
    body.innerHTML = sec('Dark', groups.dark) + sec('Light', groups.light);
    body.querySelectorAll('.stp-item').forEach(el => {
      el.addEventListener('click', () => apply(el.dataset.slug, el.dataset.mode));
    });
  }

  function apply(slug, mode) {
    // 1. Swap stylesheet href in place — no reload, no FOUC.
    const link = document.getElementById('bootstrapCss');
    if (link) link.href = bsCssUrl(slug);
    // 2. Toggle data-bs-theme so Bootstrap 5.3 token system picks the right palette.
    document.documentElement.setAttribute('data-bs-theme', mode);
    // 3. Reflect active state in the picker.
    body.querySelectorAll('.stp-item').forEach(el =>
      el.classList.toggle('active', el.dataset.slug === slug));
    // 4. Persist to cookie via the backend (best-effort; failure is non-fatal).
    fetch('/theme/set', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({slug}),
      credentials: 'same-origin',
    }).catch(() => {});
  }

  fab.addEventListener('click', e => {
    e.stopPropagation();
    panel.classList.toggle('open');
  });
  close.addEventListener('click', () => panel.classList.remove('open'));
  document.addEventListener('click', e => {
    if (!panel.contains(e.target) && e.target !== fab) panel.classList.remove('open');
  });

  render();
})();
</script>

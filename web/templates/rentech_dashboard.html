<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>RenTech Quant Engine — Jim Simons Inspired</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--bull:#00c853;--bear:#ff1744;--neutral:#ffc107;--card-bg:#0d1117;--bg:#010409;--accent:#58a6ff;--accent2:#7c4dff;--accent3:#f0883e;--green-dim:rgba(0,200,83,.15);--red-dim:rgba(255,23,68,.15);--blue-dim:rgba(88,166,255,.12)}
body{background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:#c9d1d9}
.card{background:var(--card-bg);border:1px solid #21262d;border-radius:10px}
.card-header{background:rgba(255,255,255,.03);border-bottom:1px solid #21262d;padding:12px 16px}
.bull{color:var(--bull)}.bear{color:var(--bear)}.neutral{color:var(--neutral)}.accent{color:var(--accent)}
.bg-bull{background:var(--green-dim)!important}.bg-bear{background:var(--red-dim)!important}
.bg-neutral{background:rgba(255,193,7,.1)!important}
.score-bar{height:8px;border-radius:4px;background:#161b22;overflow:hidden;margin-top:4px}
.score-fill{height:100%;border-radius:4px;transition:width .6s ease}
.verdict-badge{font-size:1.6rem;padding:10px 28px;border-radius:8px;font-weight:700;letter-spacing:2px;display:inline-block}
.indicator-val{font-size:1.3rem;font-weight:600}
.section-title{font-size:.85rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:0}
.mini-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.4)}
.ticker-search{max-width:520px;margin:0 auto;position:relative}
.ticker-search input{background:rgba(255,255,255,.05);border:1px solid #30363d;color:#fff;border-radius:8px;padding:10px 16px;font-size:1.05rem}
.ticker-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(88,166,255,.25)}
.autocomplete-list{position:absolute;top:100%;left:0;z-index:9999;width:100%;max-height:240px;overflow-y:auto;background:#161b22;border:1px solid #30363d;border-radius:0 0 8px 8px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.autocomplete-list .item{padding:8px 16px;cursor:pointer;font-size:.95rem}
.autocomplete-list .item:hover,.autocomplete-list .item.active{background:rgba(88,166,255,.2)}
.alpha-row{padding:10px 14px;border-bottom:1px solid #21262d;transition:background .2s}
.alpha-row:last-child{border-bottom:none}
.alpha-row:hover{background:rgba(88,166,255,.05)}
.alpha-bar{height:6px;border-radius:3px;background:#161b22;position:relative;margin-top:4px}
.alpha-fill{height:100%;border-radius:3px;position:absolute;top:0;transition:width .5s ease}
.stat-card{padding:14px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid #21262d;height:100%}
.stat-val{font-size:1.5rem;font-weight:700;line-height:1.2}
.stat-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.4);margin-top:2px}
.regime-badge{padding:6px 14px;border-radius:6px;font-weight:600;font-size:.85rem;letter-spacing:1px}
.edu-box{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.15);border-radius:8px;padding:14px;margin-top:12px;font-size:.82rem;line-height:1.7;color:rgba(255,255,255,.7)}
.edu-box strong{color:var(--accent)}
.transition-bar{display:flex;height:24px;border-radius:4px;overflow:hidden;font-size:.7rem;font-weight:600}
.transition-bar div{display:flex;align-items:center;justify-content:center;transition:width .5s}
.grade-A{color:#00c853;border-color:#00c853}.grade-B{color:#69f0ae;border-color:#69f0ae}
.grade-C{color:#ffc107;border-color:#ffc107}.grade-D{color:#ff5252;border-color:#ff5252}
#loading{display:none}
.spinner-border{width:2rem;height:2rem}
.help-box{background:rgba(88,166,255,.04);border:1px solid rgba(88,166,255,.12);border-radius:10px;padding:16px 18px;margin-top:14px;font-size:.8rem;line-height:1.8;color:rgba(255,255,255,.65)}
.help-box h6{color:var(--accent);font-size:.82rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.help-box .term{display:inline;color:var(--accent);font-weight:600}
.help-box .good{color:var(--bull)}.help-box .bad{color:var(--bear)}.help-box .mid{color:var(--neutral)}
.help-box ul{margin:4px 0 4px 16px;padding:0}
.help-box li{margin-bottom:2px}
.intro-card{background:linear-gradient(135deg,rgba(88,166,255,.08),rgba(124,77,255,.06));border:1px solid rgba(88,166,255,.18);border-radius:12px;padding:20px 24px;margin-bottom:20px}
.intro-card h5{color:var(--accent);margin-bottom:10px}
.intro-card p{font-size:.85rem;line-height:1.7;color:rgba(255,255,255,.65);margin-bottom:6px}
.grade-legend{display:inline-flex;gap:12px;flex-wrap:wrap;margin-top:6px}
.grade-legend span{font-size:.78rem;font-weight:600;padding:3px 10px;border-radius:5px;border:1px solid}
/* Standardized header nav (matches other pages) */
@keyframes brandShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes brandGlow{0%{filter:drop-shadow(0 0 8px rgba(246,211,101,.4))}100%{filter:drop-shadow(0 0 16px rgba(246,211,101,.7))}}
.sc-nav{position:sticky;top:0;z-index:1030;background:rgba(13,17,23,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(48,54,61,.8);padding:.35rem 0}
.sc-nav .sc-brand{font-weight:900;font-size:1.6rem;text-decoration:none;white-space:nowrap;padding:.4rem 0;letter-spacing:.5px;background:linear-gradient(135deg,#f6d365 0%,#fda085 25%,#fbc2eb 50%,#f6d365 75%,#fda085 100%);background-size:300% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:brandShimmer 3s ease infinite,brandGlow 2s ease-in-out infinite alternate;filter:drop-shadow(0 0 10px rgba(246,211,101,.5));transition:filter .3s,transform .3s}
.sc-nav .sc-brand:hover{filter:drop-shadow(0 0 18px rgba(246,211,101,.8)) drop-shadow(0 0 35px rgba(253,160,133,.4));transform:scale(1.05)}
.sc-nav .sc-links{display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.sc-nav .sc-links::-webkit-scrollbar{display:none}
.sc-nav .sc-link{color:#8b949e;text-decoration:none;font-size:.82rem;font-weight:500;padding:.85rem .75rem;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.sc-nav .sc-link:hover{color:#c9d1d9;border-bottom-color:rgba(88,166,255,.3)}
.sc-nav .sc-link.active{color:#58a6ff;border-bottom-color:#58a6ff}
@media(max-width:768px){.sc-nav .sc-link{font-size:.75rem;padding:.65rem .5rem}.sc-nav .sc-brand{font-size:1.2rem}}
</style>
</head>
<body>

<!-- NAV — standardized to match other pages -->
<nav class="sc-nav">
  <div class="container-fluid d-flex align-items-center px-3 gap-2">
    <a class="sc-brand" href="/">हिरण्य</a>

      <a class="sc-link" href="/">Home</a>

      <a class="sc-link" href="/global-sentiment" style="color:#fbc2eb">🌍 Global</a>
          <a class="sc-link" href="/sentiment" style="color:#e040fb">📡 Sentiment</a>
      <a class="sc-link" href="/trades">Trades</a>

    </div>
  </div>
</nav>

<!-- SEARCH -->
<div class="container-fluid py-3">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="ticker-search position-relative">
        <div class="input-group">
          <span class="input-group-text" style="background:rgba(255,255,255,.05);border:1px solid #30363d;color:var(--accent)"><i class="bi bi-search"></i></span>
          <input type="text" id="tickerInput" class="form-control" placeholder="Enter NSE ticker (e.g. RELIANCE, TCS, INFY)" autocomplete="off">
          <button class="btn btn-primary" id="analyzeBtn" style="background:var(--accent);border-color:var(--accent)">
            <i class="bi bi-cpu me-1"></i>Analyze
          </button>
        </div>
        <div class="autocomplete-list" id="autoList"></div>
      </div>
      <div class="text-center mt-2" style="font-size:.75rem;color:rgba(255,255,255,.3)">
        Renaissance Technologies-inspired quantitative analysis for Indian equities
        <span id="tickerCount" style="margin-left:8px;color:var(--accent)"></span>
      </div>
    </div>
  </div>
</div>

<!-- ERROR BANNER -->
<div id="errorBanner" class="container-fluid px-3" style="display:none">
  <div class="alert alert-danger d-flex align-items-center" role="alert" style="background:rgba(255,23,68,.12);border:1px solid rgba(255,23,68,.3);color:#ff8a80;border-radius:10px">
    <i class="bi bi-exclamation-triangle-fill me-2" style="font-size:1.3rem"></i>
    <div id="errorText" style="flex:1"></div>
    <button type="button" class="btn-close btn-close-white ms-2" onclick="qs('#errorBanner').style.display='none'"></button>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="text-center py-5">
  <div class="spinner-border text-primary" role="status"></div>
  <div class="mt-2" style="color:rgba(255,255,255,.5)">Running 7 statistical models + regime detection + risk analysis…</div>
</div>

<!-- RESULTS -->
<div id="results" class="container-fluid px-3 pb-5" style="display:none">

  <!-- VERDICT BANNER -->
  <div id="verdictBanner" class="text-center mb-4"></div>

  <!-- SYSTEM INTRO (rendered by JS) -->
  <div id="introPanel" class="mb-4"></div>

  <!-- ROW 1: Score + Regime + Risk -->
  <div class="row g-3 mb-3">
    <div class="col-lg-4" id="scorePanel"></div>
    <div class="col-lg-4" id="regimePanel"></div>
    <div class="col-lg-4" id="riskPanel"></div>
  </div>

  <!-- ROW 2: Alpha Signals -->
  <div class="row g-3 mb-3">
    <div class="col-12" id="alphaPanel"></div>
  </div>

  <!-- ROW 3: Statistical Profile -->
  <div class="row g-3 mb-3">
    <div class="col-12" id="statsPanel"></div>
  </div>

  <!-- ROW 4: Risk Levels + Transaction Costs -->
  <div class="row g-3 mb-3">
    <div class="col-lg-6" id="levelsPanel"></div>
    <div class="col-lg-6" id="costsPanel"></div>
  </div>

  <!-- ROW 5: Regime Transitions + Micro Regime -->
  <div class="row g-3 mb-3">
    <div class="col-lg-6" id="transitionPanel"></div>
    <div class="col-lg-6" id="microPanel"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* avoid potential conflicts with browser extensions that define $ */
const qs = function(s){ return document.querySelector(s); };
const qsa = function(s){ return document.querySelectorAll(s); };
var TICKERS = [];
var DATA = null;

// ─── Autocomplete ────────────────────────────
(function initAutocomplete(){
  var inp = document.getElementById('tickerInput');
  var autoList = document.getElementById('autoList');
  var tickerCountEl = document.getElementById('tickerCount');

  if(!inp){ console.error('[RenTech] #tickerInput not found!'); return; }
  if(!autoList){ console.error('[RenTech] #autoList not found!'); return; }

  console.log('[RenTech] Autocomplete init: inp=', inp, 'autoList=', autoList);

  // Load tickers
  function loadTickers(){
    console.log('[RenTech] Fetching tickers...');
    fetch('/api/rentech/tickers?_=' + Date.now())
      .then(function(r){
        if(!r.ok) throw new Error('HTTP '+r.status);
        return r.json();
      })
      .then(function(t){
        TICKERS = t;
        console.log('[RenTech] Loaded', t.length, 'tickers');
        if(tickerCountEl) tickerCountEl.textContent = '(' + t.length + ' stocks available)';
      })
      .catch(function(e){
        console.error('[RenTech] Failed to load tickers:', e);
        if(tickerCountEl) tickerCountEl.textContent = '(ticker load failed - retrying...)';
        setTimeout(function(){
          fetch('/api/rentech/tickers?_=' + Date.now()).then(function(r){ return r.json(); }).then(function(t){
            TICKERS = t;
            console.log('[RenTech] Loaded', t.length, 'tickers (retry)');
            if(tickerCountEl) tickerCountEl.textContent = '(' + t.length + ' stocks available)';
          }).catch(function(e2){
            console.error('[RenTech] Retry failed:', e2);
            if(tickerCountEl) tickerCountEl.textContent = '(ticker load failed)';
          });
        }, 2000);
      });
  }
  loadTickers();

  // Input handler for autocomplete
  inp.addEventListener('input', function(){
    var q = inp.value.toUpperCase().trim();
    console.log('[RenTech] Input event, query="'+q+'", TICKERS.length='+TICKERS.length);
    if(q.length < 1){ autoList.style.display = 'none'; return; }
    var matches = TICKERS.filter(function(t){
      var clean = t.replace('.NS','').replace('.BO','');
      return clean.indexOf(q) !== -1 || t.indexOf(q) !== -1;
    }).slice(0, 20);
    console.log('[RenTech] Matches:', matches.length);
    if(matches.length > 0){
      autoList.innerHTML = matches.map(function(t){
        return '<div class="item">' + t.replace('.NS','') + '</div>';
      }).join('');
      autoList.style.display = 'block';
    } else {
      autoList.style.display = 'none';
    }
  });

  // Click handler for autocomplete items
  autoList.addEventListener('click', function(e){
    if(e.target.classList.contains('item')){
      inp.value = e.target.textContent;
      autoList.style.display = 'none';
      runAnalysis();
    }
  });

  // Enter key triggers analysis
  inp.addEventListener('keydown', function(e){ if(e.key === 'Enter') runAnalysis(); });

  // Click outside closes autocomplete
  document.addEventListener('click', function(e){
    if(!e.target.closest('.ticker-search')) autoList.style.display = 'none';
  });
})();

// Analyze button
document.getElementById('analyzeBtn').addEventListener('click', runAnalysis);

// ─── Analysis ────────────────────────────────
function showError(msg){
  qs('#errorText').textContent = msg;
  qs('#errorBanner').style.display='block';
  qs('#results').style.display='none';
}

function runAnalysis(){
  var ticker = document.getElementById('tickerInput').value.trim();
  if(!ticker)return;
  qs('#loading').style.display='block';
  qs('#results').style.display='none';
  qs('#errorBanner').style.display='none';
  fetch(`/api/rentech/analyze?ticker=${encodeURIComponent(ticker)}`)
    .then(r=>{
      if(!r.ok && r.status !== 404 && r.status !== 400){
        throw new Error(`Server error (HTTP ${r.status})`);
      }
      return r.json();
    })
    .then(d=>{
      qs('#loading').style.display='none';
      DATA=d;
      if(!d.success){
        showError(d.error || 'Analysis failed — unknown error');
        return;
      }
      try{
        renderAll(d);
        qs('#results').style.display='block';
      }catch(renderErr){
        console.error('Render error:', renderErr);
        showError('Dashboard render error: ' + renderErr.message);
      }
    })
    .catch(e=>{
      qs('#loading').style.display='none';
      showError('Request failed: ' + e.message);
    });
}

// ─── Color helpers ───────────────────────────
function scoreColor(s){return s>30?'var(--bull)':s<-30?'var(--bear)':'var(--neutral)'}
function dirColor(d){return d.includes('LONG')?'var(--bull)':d.includes('SHORT')?'var(--bear)':'var(--neutral)'}
function gradeClass(g){return 'grade-'+g}
function actionBg(a){
  if(a.includes('BUY'))return 'background:rgba(0,200,83,.2);border:2px solid var(--bull)';
  if(a.includes('SELL'))return 'background:rgba(255,23,68,.2);border:2px solid var(--bear)';
  return 'background:rgba(255,193,7,.15);border:2px solid var(--neutral)';
}
function actionColor(a){
  if(a.includes('BUY'))return 'var(--bull)';
  if(a.includes('SELL'))return 'var(--bear)';
  return 'var(--neutral)';
}
function regimeBg(r){
  if(r==='BULL')return 'background:var(--green-dim);color:var(--bull)';
  if(r==='BEAR')return 'background:var(--red-dim);color:var(--bear)';
  if(r==='HIGH_VOLATILITY')return 'background:rgba(255,152,0,.15);color:#ff9800';
  return 'background:var(--blue-dim);color:var(--accent)';
}

// ─── Render ──────────────────────────────────
function renderAll(d){
  renderVerdict(d.verdict, d.ticker);
  renderIntro(d);
  renderScore(d.verdict, d.signals);
  renderRegime(d.regime);
  renderRisk(d.risk);
  renderAlphas(d.signals);
  renderStats(d.statistical_profile);
  renderLevels(d.risk);
  renderCosts(d.risk);
  renderTransitions(d.regime);
  renderMicro(d.regime);
}

function renderIntro(d){
  qs('#introPanel').innerHTML = `
    <div class="intro-card">
      <h5><i class="bi bi-lightbulb me-2"></i>How to Read This Dashboard</h5>
      <p>This dashboard uses <strong style="color:var(--accent)">7 mathematical models</strong> — inspired by Renaissance Technologies, the most successful quant hedge fund in history — to analyze whether a stock is worth buying, selling, or holding. Think of it as a <strong style="color:var(--accent)">doctor's report for a stock</strong>: each test checks a different "vital sign" of the stock's health.</p>
      <div class="row mt-3">
        <div class="col-md-4 mb-2">
          <div style="font-size:.78rem;color:rgba(255,255,255,.5)">
            <strong style="color:var(--accent)"><i class="bi bi-1-circle me-1"></i>Action & Grade</strong> — The big verdict at the top tells you what to do (<span class="good">BUY</span>, <span class="bad">SELL</span>, or <span class="mid">HOLD</span>) and rates the confidence from <span class="good">A (excellent)</span> to <span class="bad">D (weak)</span>. Only act on Grade A or B signals.
          </div>
        </div>
        <div class="col-md-4 mb-2">
          <div style="font-size:.78rem;color:rgba(255,255,255,.5)">
            <strong style="color:var(--accent)"><i class="bi bi-2-circle me-1"></i>Score Bar (−100 to +100)</strong> — A single number that combines all 7 models. <span class="good">Positive = bullish (stock likely to go up)</span>. <span class="bad">Negative = bearish (stock likely to go down)</span>. The stronger the number, the stronger the signal.
          </div>
        </div>
        <div class="col-md-4 mb-2">
          <div style="font-size:.78rem;color:rgba(255,255,255,.5)">
            <strong style="color:var(--accent)"><i class="bi bi-3-circle me-1"></i>Risk & Position Size</strong> — Even a great signal needs risk management. The system calculates exactly how many shares to buy, where to set your stop-loss, and your maximum possible loss — so you never risk too much.
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderVerdict(v, ticker){
  const t = ticker.replace('.NS','');
  const gradeExp = {
    'A':'Grade A = Excellent setup. Multiple models agree strongly. High conviction — this is the best quality signal.',
    'B':'Grade B = Good setup. Most models agree with decent conviction. Worth acting on, but not as strong as A.',
    'C':'Grade C = Mixed signals. Some models say buy, others disagree. Proceed with caution or wait for a better setup.',
    'D':'Grade D = Weak or conflicting signals. Not enough statistical evidence to act. Best to stay on the sidelines.'
  };
  const actionExp = {
    'STRONG_BUY':'All signals point strongly upward. The math says this stock has a very high probability of going up.',
    'BUY':'Most signals are positive. The stock looks attractive from a quantitative perspective.',
    'WEAK_BUY':'Slightly more bullish than bearish. A tentative positive outlook — not a strong conviction.',
    'HOLD':'Signals are mixed or neutral. No clear direction — best to wait for a clearer opportunity.',
    'WEAK_SELL':'Slightly more bearish than bullish. Minor caution — the stock may drift lower.',
    'SELL':'Most signals are negative. The stock looks unattractive — consider reducing exposure.',
    'STRONG_SELL':'All signals point strongly downward. The math says this stock has a high probability of falling.'
  };
  qs('#verdictBanner').innerHTML = `
    <h4 class="mb-2" style="color:rgba(255,255,255,.5)">${t} — RenTech Quant Analysis</h4>
    <span class="verdict-badge" style="${actionBg(v.action)};color:${actionColor(v.action)}">
      ${v.action}
    </span>
    <span class="ms-3 ${gradeClass(v.grade)}" style="font-size:1.4rem;font-weight:700;border:2px solid;padding:6px 14px;border-radius:8px">
      Grade ${v.grade}
    </span>
    <div class="mt-2" style="font-size:.9rem;color:rgba(255,255,255,.6)">${v.reason}</div>
    <div class="mt-1" style="font-size:.75rem;color:rgba(255,255,255,.35)">
      Compute: ${DATA.compute_time_ms}ms | Bars: ${DATA.data_bars} | Signal decays in ~${v.decay_days} days
    </div>
    <div class="help-box mt-3 text-start" style="max-width:800px;margin-left:auto;margin-right:auto">
      <h6><i class="bi bi-info-circle me-1"></i>What does this verdict mean?</h6>
      <p style="margin:0 0 6px"><strong class="term">${v.action}:</strong> ${actionExp[v.action]||'The system is evaluating this stock based on 7 statistical models.'}</p>
      <p style="margin:0 0 6px"><strong class="term">Grade ${v.grade}:</strong> ${gradeExp[v.grade]||''}</p>
      <p style="margin:0 0 6px"><strong class="term">Signal Decay (~${v.decay_days} days):</strong> This signal is <em>not permanent</em>. Stock patterns change. In about ${v.decay_days} days, this analysis should be re-run because market conditions will have shifted and the recommendation may no longer be valid.</p>
      <div class="grade-legend mt-2">
        <span class="grade-A" style="background:rgba(0,200,83,.1)">A = Excellent</span>

  qs('#alphaPanel').innerHTML = `

          <h6><i class="bi bi-info-circle me-1"></i>What are Alpha Signals?</h6>
          <p style="margin:0 0 8px">"Alpha" means <em>excess return above the market average</em>. Each row above is a different mathematical model that looks at the stock from a unique angle — like getting 7 different expert opinions. The system combines all 7 to reach its final verdict.</p>
          <ul>
            <li><strong class="term">Score (−100 to +100):</strong> Each model's individual opinion. <span class="good">Positive = bullish</span>, <span class="bad">negative = bearish</span>.</li>

            <li><strong class="term">The 7 Models Explained:</strong></li>
            <li><strong>1. Mean Reversion:</strong> "What goes up must come down." This model checks if the stock is overextended and due for a pullback (or recovery).</li>
            <li><strong>2. Momentum:</strong> "The trend is your friend." Measures if the stock has strong upward or downward momentum that is likely to continue.</li>
            <li><strong>3. Statistical Arbitrage:</strong> Finds mathematical mispricings using z-scores and half-life calculations.</li>
            <li><strong>4. Volatility:</strong> Analyzes price swings. Expanding volatility can mean breakouts; contracting volatility (squeeze) can signal imminent big moves.</li>
            <li><strong>5. Microstructure:</strong> Looks at volume patterns and price-volume relationships to detect hidden buying or selling pressure.</li>
            <li><strong>6. Regime:</strong> Adjusts signals based on whether the market is in a bull, bear, or sideways phase.</li>

      </div>
    </div>
  `;
}

  qs('#statsPanel').innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="section-title"><i class="bi bi-calculator me-1"></i>Statistical Profile — 7 Core Tests</span>
        <span class="ms-2 badge bg-secondary">${sp.optimal_strategy}</span>
      </div>

        <div class="help-box mb-3">

          <div class="row" style="font-size:.76rem">

                <li><strong class="term">Momentum Score (0–100):</strong> Does the stock trend strongly? <span class="good">High score = strong trends</span> you can ride. Low = stock moves randomly.</li>

                <li><strong class="term">Statistical Edge (0–100):</strong> The overall mathematical advantage. <span class="good">Above 60 = solid edge</span>. Below 30 = the stock is too random to trade reliably.</li>

          <h6><i class="bi bi-info-circle me-1"></i>Price Levels Explained</h6>
          <ul>
            <li><strong class="term">Entry Price:</strong> The current/recommended price to enter the trade. This is typically the latest closing price.</li>
            <li><strong class="bad">Stop Loss:</strong> The "emergency exit" price. If the stock falls to this level, you sell immediately to limit your loss. The % shows how far below your entry this is.</li>
            <li><strong class="term">Trailing Stop:</strong> A dynamic stop that moves up as the stock rises. It locks in profits while still giving the trade room to breathe.</li>
            <li><strong class="good">Target 1, 2, 3:</strong> Profit-taking levels. The "R" value (e.g., 2.0R) means the reward-to-risk ratio. Target 1 at 2.0R means your potential profit is 2x your risk. A common strategy: sell 1/3 at Target 1, 1/3 at Target 2, and 1/3 at Target 3.</li>
            <li><strong class="term">ATR(14):</strong> "Average True Range" over 14 days — measures how much the stock typically moves in one day. A higher ATR means the stock is more volatile. All stop-loss and target levels are calculated using ATR multiples.</li>
          </ul>
        </div>
      </div>
    </div>
  `;
}

function renderCosts(r){
  const c = r.costs;
  const p = r.position;
  qs('#costsPanel').innerHTML = `
    <div class="card h-100">
      <div class="card-header"><span class="section-title"><i class="bi bi-cash-stack me-1"></i>Transaction Costs & Position</span></div>
      <div class="card-body">
        <table class="table table-sm table-dark mb-2" style="font-size:.85rem">
          <tr><td>Buy Cost</td><td class="text-end">${c.buy_pct!=null?c.buy_pct.toFixed(3):'—'}%</td></tr>
          <tr><td>Sell Cost (STT)</td><td class="text-end">${c.sell_pct!=null?c.sell_pct.toFixed(3):'—'}%</td></tr>
          <tr class="fw-bold"><td>Round-Trip</td><td class="text-end">${c.round_trip_pct!=null?c.round_trip_pct.toFixed(3):'—'}% (₹${c.round_trip_rupees!=null?c.round_trip_rupees.toFixed(0):'—'})</td></tr>
          <tr style="color:var(--neutral)"><td>Breakeven Move</td><td class="text-end">${c.breakeven_pct!=null?c.breakeven_pct.toFixed(3):'—'}%</td></tr>
        </table>
        <div class="mini-label mb-1">POSITION SIZING METHOD</div>
        <div class="badge bg-secondary mb-2">${p.method}</div>
        <div class="edu-box">${p.explanation}</div>
        <div class="help-box">
          <h6><i class="bi bi-info-circle me-1"></i>Costs & Position Sizing Explained</h6>
          <ul>
            <li><strong class="term">Buy Cost (%):</strong> The brokerage + taxes you pay when buying shares (typically ~0.03–0.05% on Indian exchanges including brokerage, stamp duty, GST, exchange fees).</li>
            <li><strong class="term">Sell Cost (STT):</strong> The charges when selling, including Securities Transaction Tax (STT). Selling is slightly more expensive than buying in India.</li>
            <li><strong class="term">Round-Trip Cost:</strong> Total cost for one complete trade (buy + sell). This is the "toll" you must pay regardless of profit. Example: 0.1% round-trip on ₹1 lakh = ₹100 lost to fees.</li>
            <li><strong class="mid">Breakeven Move:</strong> The stock must move at LEAST this much in your direction just to cover transaction costs. Any move smaller than this is a loss after fees. <span class="mid">This is why over-trading is expensive!</span></li>
            <li><strong class="term">Position Sizing Method:</strong> How the system decides how many shares to buy. Common methods: "Kelly Criterion" (math-optimal sizing), "Fixed Risk" (always risk same % of portfolio), "Volatility Adjusted" (bigger positions in calm stocks, smaller in volatile ones).</li>
          </ul>
        </div>
      </div>
    </div>
  `;
}

function renderTransitions(r){
  const t = r.transition;
  const total = (t.to_bull+t.to_bear+t.to_sideways+t.to_high_vol)||1;
  qs('#transitionPanel').innerHTML = `
    <div class="card h-100">
      <div class="card-header"><span class="section-title"><i class="bi bi-arrow-left-right me-1"></i>Regime Transition Probabilities</span></div>
      <div class="card-body">
        <div class="transition-bar mb-3">
          <div style="width:${t.to_bull/total*100}%;background:var(--green-dim);color:var(--bull)">Bull ${(t.to_bull*100).toFixed(0)}%</div>
          <div style="width:${t.to_bear/total*100}%;background:var(--red-dim);color:var(--bear)">Bear ${(t.to_bear*100).toFixed(0)}%</div>
          <div style="width:${t.to_sideways/total*100}%;background:var(--blue-dim);color:var(--accent)">Side ${(t.to_sideways*100).toFixed(0)}%</div>
          <div style="width:${t.to_high_vol/total*100}%;background:rgba(255,152,0,.15);color:#ff9800">Vol ${(t.to_high_vol*100).toFixed(0)}%</div>
        </div>
        <div class="text-center mb-2">
          Most likely next: <strong style="color:var(--accent)">${t.most_likely_next}</strong>
        </div>
        <div class="edu-box">${t.explanation}</div>
        <div class="help-box">
          <h6><i class="bi bi-info-circle me-1"></i>What are Transition Probabilities?</h6>
          <p style="margin:0 0 6px">Markets don't stay in one mood forever. This bar chart shows the <em>probability of what comes next</em>, based on historical patterns:</p>
          <ul>
            <li>The colored bar represents the likelihood of the market transitioning to each regime. For example, if Bull is 45%, there is a 45% chance the market moves into a bullish phase next.</li>
            <li><strong class="term">Most Likely Next:</strong> The regime with the highest probability — this is where the market is most likely headed.</li>
            <li><strong>Why it matters:</strong> If you are in a BULL regime but transition probabilities show 60% chance of BEAR next — that is an early warning signal to tighten stops or reduce exposure.</li>
            <li>These probabilities are calculated from how the stock has historically behaved after similar regimes. Think of it as weather forecasting — "after sunny days in this city, there is usually a 30% chance of rain."</li>
          </ul>
        </div>
      </div>
    </div>
  `;
}

function renderMicro(r){
  const m = r.micro;
  const flowColor = m.flow_proxy==='ACCUMULATION'?'var(--bull)':m.flow_proxy==='DISTRIBUTION'?'var(--bear)':'var(--neutral)';
  const breadthColor = m.breadth==='BROAD_ADVANCE'?'var(--bull)':m.breadth==='BROAD_DECLINE'?'var(--bear)':'var(--neutral)';
  qs('#microPanel').innerHTML = `
    <div class="card h-100">
      <div class="card-header"><span class="section-title"><i class="bi bi-microscope me-1"></i>Micro Regime</span></div>
      <div class="card-body">
        <div class="row text-center mb-3">
          <div class="col-3">
            <div class="stat-val">${m.trend_strength!=null?m.trend_strength.toFixed(0):'—'}</div>
            <div class="stat-label">ADX Trend</div>
          </div>
          <div class="col-3">
            <div class="stat-val" style="color:${m.vol_compression?'var(--accent3)':'rgba(255,255,255,.3)'}">${m.vol_compression?'YES':'NO'}</div>
            <div class="stat-label">Squeeze</div>
          </div>
          <div class="col-3">
            <div class="stat-val" style="color:${breadthColor}">${m.breadth.replace(/_/g,' ')}</div>
            <div class="stat-label">Breadth</div>
          </div>
          <div class="col-3">
            <div class="stat-val" style="color:${flowColor}">${m.flow_proxy}</div>
            <div class="stat-label">Flow</div>
          </div>
        </div>
        <div class="edu-box">${m.explanation}</div>
        <div class="help-box">
          <h6><i class="bi bi-info-circle me-1"></i>Micro Regime — Short-Term Market Clues</h6>
          <p style="margin:0 0 6px">While the Market Regime above shows the big-picture trend, the Micro Regime zooms in on <em>right now</em> — what is happening in the last few days:</p>
          <ul>
            <li><strong class="term">ADX Trend Strength (0–100):</strong> ADX measures how strong the current trend is — regardless of direction. <span class="good">Above 25 = a strong trend is underway</span>. Below 20 = the stock is moving sideways with no clear trend. ADX does NOT tell you which direction — just how strong.</li>
            <li><strong class="mid">Squeeze (YES/NO):</strong> A \"volatility squeeze\" means the stock's price range has been <em>unusually compressed</em> — like a coiled spring. When a squeeze is detected, a <strong>big move is likely coming soon</strong> (though which direction is uncertain). Think of it as calm before the storm.</li>
            <li><strong class="term">Breadth:</strong> Whether the move involves broad participation. <span class="good">BROAD ADVANCE = many signals agree on upward movement</span>. <span class="bad">BROAD DECLINE = widespread selling pressure</span>. MIXED = no consensus.</li>
            <li><strong class="term">Flow (<span class="good">ACCUMULATION</span> / <span class="bad">DISTRIBUTION</span> / <span class="mid">NEUTRAL</span>):</strong> Are big players (institutions) quietly buying or selling? <span class="good">Accumulation = smart money is buying</span> (bullish sign even if price is flat). <span class="bad">Distribution = smart money is selling</span> (bearish sign even if price looks fine). This is detected through volume-price analysis.</li>
          </ul>
        </div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
